<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyNet</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#eff2f699;}

/* ── Navbar ── */
.nav{height:44px;background:#282828;border-bottom:1px solid #3a3a3a;display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:10;}
.nav-logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;letter-spacing:3px;color:#ef4743;text-shadow:0 0 12px rgba(239,71,67,0.4);margin-right:8px;}
.nav-sep{width:1px;height:20px;background:#3a3a3a;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{font-size:13px;padding:5px 12px;border-radius:5px;border:none;background:transparent;color:#eff2f699;cursor:pointer;transition:background .15s;}
.nav-tab:hover{background:#3a3a3a;}
.nav-tab.active{background:#3a3a3a;color:#fff;}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.nav-stat{font-size:12px;color:#eff2f699;background:#3a3a3a;border-radius:5px;padding:3px 10px;}
.nav-stat b{color:#ef4743;}

/* ── Problem list ── */
#list-view{display:flex;height:calc(100vh - 44px);}
.sidebar{width:100%;background:#1a1a1a;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:2px;}

.filter-bar{padding:12px 16px;border-bottom:1px solid #2a2a2a;display:flex;gap:8px;background:#1a1a1a;position:sticky;top:0;z-index:5;}
.filter-sel{font-size:12px;padding:5px 10px;border-radius:5px;border:1px solid #3a3a3a;background:#282828;color:#eff2f699;cursor:pointer;outline:none;}
.filter-sel:hover{border-color:#ef4743;}

/* Problem table */
.prob-table{width:100%;border-collapse:collapse;}
.prob-table thead tr{border-bottom:1px solid #2a2a2a;}
.prob-table th{font-size:12px;color:#eff2f666;font-weight:400;padding:10px 16px;text-align:left;background:#1a1a1a;position:sticky;top:53px;}
.prob-table tr{border-bottom:1px solid #2a2a2a;cursor:pointer;transition:background .1s;}
.prob-table tbody tr:hover{background:#282828;}
.prob-table tbody tr.active-row{background:#282828;}
.prob-table td{padding:10px 16px;font-size:13px;}
.td-status{width:40px;text-align:center;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#2cbb5d;display:inline-block;}
.td-title{color:#eff2f699;}
.td-title:hover{color:#fff;}
.td-acceptance{color:#eff2f666;font-size:12px;}
.diff-easy  {color:#2cbb5d;font-size:12px;}
.diff-medium{color:#ffb800;font-size:12px;}
.diff-hard  {color:#ef4743;font-size:12px;}
.topic-tag{font-size:11px;padding:1px 8px;border-radius:4px;background:#2a2a2a;color:#eff2f666;margin-right:4px;}

/* Welcome panel */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#eff2f644;border-left:1px solid #2a2a2a;}
.welcome-logo{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:#ef4743;letter-spacing:6px;text-shadow:0 0 30px rgba(239,71,67,0.3);}
.welcome-sub{font-size:13px;letter-spacing:2px;color:#3a3a3a;}
.welcome-hint{font-size:12px;color:#3a3a3a;margin-top:8px;}

/* ── Editor view ── */
#editor-view{display:none;height:calc(100vh - 44px);}
.split{display:flex;height:100%;}

/* Left panel */
.left-panel{width:46%;min-width:320px;background:#282828;border-right:1px solid #3a3a3a;display:flex;flex-direction:column;overflow:hidden;}
.lp-header{padding:12px 16px;border-bottom:1px solid #3a3a3a;display:flex;align-items:center;gap:8px;}
.back-btn{font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;cursor:pointer;}
.back-btn:hover{background:#3a3a3a;}
.lp-title{font-size:15px;font-weight:500;color:#fff;flex:1;}
.lp-tabs{display:flex;border-bottom:1px solid #3a3a3a;background:#282828;}
.lp-tab{font-size:13px;padding:9px 16px;border:none;background:transparent;color:#eff2f666;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
.lp-tab.active{color:#fff;border-bottom-color:#ef4743;}
.lp-tab:hover{color:#eff2f699;}
.lp-body{flex:1;overflow-y:auto;padding:20px;}
.lp-body::-webkit-scrollbar{width:4px;}
.lp-body::-webkit-scrollbar-thumb{background:#3a3a3a;}

/* Description */
.desc-badges{display:flex;gap:6px;margin-bottom:14px;align-items:center;}
.desc-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:10px;}
.desc-text{font-size:14px;color:#eff2f699;line-height:1.8;white-space:pre-wrap;}
.schema-box{background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;padding:14px;margin-top:16px;font-size:12px;font-family:'Fira Code','Consolas',monospace;color:#2cbb5d;line-height:1.9;}
.schema-box .comment{color:#eff2f644;}

/* Notes */
.note-area{width:100%;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;color:#eff2f699;font-size:13px;padding:12px;resize:vertical;font-family:inherit;min-height:140px;line-height:1.7;outline:none;}
.note-area:focus{border-color:#ef4743;}
.note-save-btn{margin-top:8px;font-size:12px;padding:6px 16px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;cursor:pointer;}
.note-save-btn:hover{background:#3a3a3a;}
.note-saved{font-size:12px;color:#2cbb5d;margin-top:6px;display:none;}

/* Hint */
.hint-req-btn{font-size:12px;padding:6px 16px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;cursor:pointer;}
.hint-req-btn:hover{background:#3a3a3a;}
.hint-box{background:#1a1a1a;border:1px solid #3a3a3a;border-left:3px solid #ef4743;border-radius:6px;padding:14px;font-size:13px;color:#eff2f699;line-height:1.8;margin-top:12px;white-space:pre-wrap;}
.hint-source{font-size:11px;color:#eff2f644;margin-top:6px;}

/* Right panel */
.right-panel{flex:1;background:#1a1a1a;display:flex;flex-direction:column;overflow:hidden;}
.rp-header{height:44px;background:#282828;border-bottom:1px solid #3a3a3a;display:flex;align-items:center;padding:0 14px;gap:8px;}
.lang-sel{font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid #3a3a3a;background:#1a1a1a;color:#eff2f699;cursor:pointer;outline:none;}
.rp-right{margin-left:auto;display:flex;gap:8px;}
.btn-bk{font-size:12px;padding:5px 12px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;cursor:pointer;}
.btn-bk:hover{background:#3a3a3a;}
.btn-bk.on{color:#ffb800;border-color:#ffb800;}
.btn-run{font-size:13px;padding:5px 16px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;font-weight:500;cursor:pointer;}
.btn-run:hover{background:#3a3a3a;}
.btn-submit{font-size:13px;padding:5px 16px;border-radius:5px;border:none;background:#2cbb5d;color:#fff;font-weight:500;cursor:pointer;}
.btn-submit:hover{background:#3dd68c;}

.editor-wrap{flex:1;overflow:hidden;}
.CodeMirror{height:100% !important;font-size:13px;font-family:'Fira Code','Consolas',monospace;background:#1a1a1a !important;}
.CodeMirror-gutters{background:#1e1e1e !important;border-right:1px solid #3a3a3a !important;}
.CodeMirror-scroll{height:100%;}

/* Output */
.output-panel{height:220px;background:#1a1a1a;border-top:1px solid #3a3a3a;display:flex;flex-direction:column;}
.output-tabs{display:flex;border-bottom:1px solid #3a3a3a;background:#282828;}
.output-tab{font-size:12px;padding:7px 14px;border:none;background:transparent;color:#eff2f666;cursor:pointer;border-bottom:2px solid transparent;}
.output-tab.active{color:#fff;border-bottom-color:#ef4743;}
.output-body{flex:1;overflow-y:auto;padding:12px 14px;font-family:'Fira Code','Consolas',monospace;font-size:12px;line-height:1.7;color:#eff2f699;white-space:pre-wrap;}
.output-body.err{color:#ef4743;}
.output-body.ok{color:#eff2f699;}
.output-body::-webkit-scrollbar{width:4px;}
.output-body::-webkit-scrollbar-thumb{background:#3a3a3a;}
.run-result{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #2a2a2a;font-size:13px;}
.result-pass{color:#2cbb5d;font-weight:500;}
.result-fail{color:#ef4743;font-weight:500;}

/* SQL table */
.sql-table{width:100%;border-collapse:collapse;font-size:12px;}
.sql-table th{background:#282828;color:#ffb800;padding:6px 12px;text-align:left;border:1px solid #3a3a3a;font-weight:500;}
.sql-table td{padding:5px 12px;border:1px solid #2a2a2a;color:#eff2f699;}
.sql-table tr:hover td{background:#282828;}

/* News view */
#news-view{display:none;height:calc(100vh - 44px);overflow-y:auto;background:#1a1a1a;}
#news-view::-webkit-scrollbar{width:4px;}
#news-view::-webkit-scrollbar-thumb{background:#3a3a3a;}
.news-container{max-width:900px;margin:0 auto;padding:24px 20px;}
.news-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.news-header h2{font-size:16px;font-weight:500;color:#fff;}
.sync-btn{font-size:12px;padding:6px 14px;border-radius:5px;border:1px solid #3a3a3a;background:transparent;color:#eff2f699;cursor:pointer;}
.sync-btn:hover{background:#3a3a3a;}
.news-card{background:#282828;border:1px solid #3a3a3a;border-radius:8px;padding:16px;margin-bottom:10px;transition:border-color .15s;}
.news-card:hover{border-color:#ef474366;}
.nc-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.nc-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:5px;}
.nc-title a{color:#fff;text-decoration:none;}
.nc-title a:hover{color:#ef4743;}
.nc-summary{font-size:13px;color:#eff2f699;line-height:1.6;}
.nc-date{font-size:11px;color:#eff2f644;margin-top:6px;}
.nc-tag{font-size:11px;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.tag-ai      {background:#1a2a3a;color:#58a6ff;border:1px solid #1a3a5a;}
.tag-tools   {background:#2a1a00;color:#ffb800;border:1px solid #3a2a00;}
.tag-research{background:#2a1a2a;color:#bc8cff;border:1px solid #3a2a3a;}
.empty{text-align:center;color:#3a3a3a;font-size:13px;padding:3rem 0;}

/* Badges */
.badge{font-size:11px;padding:2px 8px;border-radius:4px;}
.b-easy  {color:#2cbb5d;background:#1a2a1a;border:1px solid #1a3a1a;}
.b-medium{color:#ffb800;background:#2a1e00;border:1px solid #3a2a00;}
.b-hard  {color:#ef4743;background:#2a1a1a;border:1px solid #3a1a1a;}
.b-topic {color:#eff2f666;background:#2a2a2a;border:1px solid #3a3a3a;}
</style>
</head>
<body>

<!-- Navbar -->
<div class="nav">
  <div class="nav-logo">SKYNET</div>
  <div class="nav-sep"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('list')">Problems</button>
    <button class="nav-tab" onclick="showView('news')">DS/AI Intel</button>
  </div>
  <div class="nav-right">
    <div class="nav-stat">Solved <b id="nav-done">0</b>/<b id="nav-total">0</b></div>
    <div class="nav-stat">Saved <b id="nav-bk">0</b></div>
  </div>
</div>

<!-- List view -->
<div id="list-view">
  <div class="sidebar">
    <div class="filter-bar">
      <select class="filter-sel" id="filter-topic" onchange="renderList()">
        <option value="">All Topics</option>
        <option>Data Wrangling</option>
        <option>ML Fundamentals</option>
        <option>SQL</option>
      </select>
      <select class="filter-sel" id="filter-diff" onchange="renderList()">
        <option value="">All Difficulties</option>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
      <select class="filter-sel" id="filter-status" onchange="renderList()">
        <option value="">All Status</option>
        <option value="done">Solved</option>
        <option value="todo">Todo</option>
        <option value="saved">Saved</option>
      </select>
    </div>
    <table class="prob-table">
      <thead>
        <tr>
          <th class="td-status">Status</th>
          <th>Title</th>
          <th>Topic</th>
          <th>Difficulty</th>
        </tr>
      </thead>
      <tbody id="challenge-list"></tbody>
    </table>
  </div>
  <div class="welcome" id="welcome-panel">
    <div class="welcome-logo">SKYNET</div>
    <div class="welcome-sub">DATA INTELLIGENCE SYSTEM</div>
    <div class="welcome-hint">← Select a problem to begin</div>
  </div>
</div>

<!-- Editor view -->
<div id="editor-view">
  <div class="split">
    <!-- Left: description -->
    <div class="left-panel">
      <div class="lp-header">
        <button class="back-btn" onclick="showView('list')">&#8592; Back</button>
        <div class="lp-title" id="lp-title"></div>
      </div>
      <div class="lp-tabs">
        <button class="lp-tab active" onclick="lpTab('desc')">Description</button>
        <button class="lp-tab" onclick="lpTab('notes')">Notes</button>
        <button class="lp-tab" onclick="lpTab('hint')">AI Hint</button>
      </div>
      <div class="lp-body">
        <div id="lp-desc">
          <div class="desc-badges" id="desc-badges"></div>
          <div class="desc-text" id="desc-text"></div>
          <div id="schema-area"></div>
        </div>
        <div id="lp-notes" style="display:none">
          <textarea class="note-area" id="note-textarea" placeholder="Write your notes here..."></textarea>
          <button class="note-save-btn" onclick="saveNote()">Save Note</button>
          <div class="note-saved" id="note-saved">&#10003; Saved</div>
        </div>
        <div id="lp-hint" style="display:none">
          <button class="hint-req-btn" id="hint-btn" onclick="fetchHint()">&#128161; Request AI Hint</button>
          <div id="hint-content"></div>
        </div>
      </div>
    </div>

    <!-- Right: editor + output -->
    <div class="right-panel">
      <div class="rp-header">
        <span class="lang-sel" id="lang-badge">Python</span>
        <div class="rp-right">
          <button class="btn-bk" id="bk-btn" onclick="toggleBookmark()">&#9733; Save</button>
          <button class="btn-run" onclick="runCode()">&#9654; Run</button>
          <button class="btn-submit" onclick="submitCode()">Submit</button>
        </div>
      </div>
      <div class="editor-wrap">
        <textarea id="main-editor"></textarea>
      </div>
      <div class="output-panel">
        <div class="output-tabs">
          <button class="output-tab active">Output</button>
          <span id="run-status" style="font-size:12px;padding:7px 14px;color:#eff2f666;"></span>
        </div>
        <div class="output-body" id="output-body">// Run your code to see output here</div>
      </div>
    </div>
  </div>
</div>

<!-- News view -->
<div id="news-view">
  <div class="news-container">
    <div class="news-header">
      <h2>DS &amp; AI Intelligence Feed</h2>
      <button class="sync-btn" onclick="loadNews()">&#8635; Sync Feed</button>
    </div>
    <div id="news-list"><div class="empty">Click "Sync Feed" to load latest DS &amp; AI research</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script>
let challenges = [], currentId = null, editor = null;

async function init() {
  const res = await fetch("/api/challenges");
  challenges = await res.json();
  updateNav(); renderList(); initEditor();
}

function updateNav() {
  document.getElementById("nav-done").textContent  = challenges.filter(c => c.done).length;
  document.getElementById("nav-total").textContent = challenges.length;
  document.getElementById("nav-bk").textContent    = challenges.filter(c => c.bookmarked).length;
}

function renderList() {
  const topic  = document.getElementById("filter-topic").value;
  const diff   = document.getElementById("filter-diff").value;
  const status = document.getElementById("filter-status").value;
  const list   = challenges.filter(c => {
    if (topic  && c.topic !== topic) return false;
    if (diff   && c.difficulty !== diff) return false;
    if (status === "done"  && !c.done) return false;
    if (status === "todo"  && c.done) return false;
    if (status === "saved" && !c.bookmarked) return false;
    return true;
  });
  const tbody = document.getElementById("challenge-list");
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty">No problems match your filters.</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((c, i) => `
    <tr onclick="openChallenge(${c.id})" class="${c.id === currentId ? 'active-row' : ''}">
      <td class="td-status">${c.done ? '<div class="status-dot"></div>' : ''}</td>
      <td class="td-title">${i+1}. ${c.title}${c.bookmarked ? ' <span style="color:#ffb800;font-size:11px">&#9733;</span>' : ''}</td>
      <td><span class="topic-tag">${c.topic}</span></td>
      <td class="diff-${c.difficulty.toLowerCase()}">${c.difficulty}</td>
    </tr>
  `).join("");
}

function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById("main-editor"), {
    theme: "dracula", lineNumbers: true,
    indentUnit: 4, tabSize: 4,
    indentWithTabs: false, lineWrapping: false
  });
}

function openChallenge(id) {
  currentId = id;
  const c = challenges.find(x => x.id === id);
  if (!c) return;
  const isSQL = c.topic === "SQL";

  editor.setOption("mode", isSQL ? "text/x-sql" : "python");
  editor.setValue(c.saved_code || c.starter_code || "");
  setTimeout(() => editor.refresh(), 50);

  document.getElementById("lang-badge").textContent = isSQL ? "SQL" : "Python";
  document.getElementById("lp-title").textContent   = c.title;
  document.getElementById("desc-badges").innerHTML  = `
    <span class="badge b-${c.difficulty.toLowerCase()}">${c.difficulty}</span>
    <span class="badge b-topic" style="margin-left:4px">${c.topic}</span>
  `;
  document.getElementById("desc-text").textContent = c.description;

  const schemaArea = document.getElementById("schema-area");
  schemaArea.innerHTML = isSQL ? `
    <div class="schema-box">
<span class="comment">-- Available tables</span>
employees  (id, name, department, dept_id, salary, age)
departments (id, dept_name, location)

<span class="comment">-- Sample rows (employees)</span>
1  Alice    Engineering  95000
2  Bob      Marketing    62000
3  Charlie  Engineering  88000
4  Diana    HR           55000
5  Eve      Engineering  102000
    </div>` : "";

  document.getElementById("note-textarea").value       = c.note || "";
  document.getElementById("note-saved").style.display  = "none";
  document.getElementById("hint-content").innerHTML    = "";
  document.getElementById("hint-btn").textContent      = "💡 Request AI Hint";
  document.getElementById("hint-btn").disabled         = false;

  const bkBtn = document.getElementById("bk-btn");
  bkBtn.textContent = c.bookmarked ? "★ Saved" : "☆ Save";
  bkBtn.className   = "btn-bk" + (c.bookmarked ? " on" : "");

  document.getElementById("output-body").textContent = "// Run your code to see output here";
  document.getElementById("output-body").className   = "output-body";
  document.getElementById("run-status").textContent  = "";

  lpTab("desc");
  showView("editor");
  renderList();
}

function lpTab(name) {
  ["desc","notes","hint"].forEach(t => {
    document.getElementById("lp-"+t).style.display = t === name ? "" : "none";
  });
  document.querySelectorAll(".lp-tab").forEach((b, i) => {
    b.classList.toggle("active", ["desc","notes","hint"][i] === name);
  });
}

async function runCode() {
  const c = challenges.find(x => x.id === currentId);
  if (!c) return;
  const code  = editor.getValue();
  const isSQL = c.topic === "SQL";
  const out   = document.getElementById("output-body");
  const status= document.getElementById("run-status");
  out.className = "output-body"; out.textContent = "Running..."; status.textContent = "";

  const res  = await fetch(isSQL ? "/api/sql" : "/api/run", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({code})
  });
  const data = await res.json();

  if (data.error) {
    out.className = "output-body err"; out.textContent = data.error;
    status.innerHTML = '<span class="result-fail">&#10007; Error</span>';
  } else if (data.columns) {
    out.className = "output-body ok";
    out.innerHTML = buildTable(data.columns, data.rows);
    status.innerHTML = `<span class="result-pass">&#10003; ${data.rows.length} row(s)</span>`;
  } else {
    out.className = "output-body ok"; out.textContent = data.output;
    status.innerHTML = '<span class="result-pass">&#10003; Success</span>';
  }
}

function buildTable(cols, rows) {
  if (!rows.length) return '<span style="color:#eff2f644">No rows returned.</span>';
  const ths = cols.map(c=>`<th>${c}</th>`).join("");
  const trs = rows.map(r=>`<tr>${r.map(v=>`<td>${v??'NULL'}</td>`).join("")}</tr>`).join("");
  return `<table class="sql-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

async function submitCode() {
  const code = editor.getValue();
  await fetch(`/api/challenges/${currentId}/solution`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
  await fetch(`/api/challenges/${currentId}/done`,{method:"POST"});
  challenges = challenges.map(c => c.id === currentId ? {...c, done:1, saved_code:code} : c);
  updateNav(); renderList();
  document.getElementById("run-status").innerHTML = '<span class="result-pass">&#10003; Submitted!</span>';
}

async function toggleBookmark() {
  const res  = await fetch(`/api/challenges/${currentId}/bookmark`,{method:"POST"});
  const data = await res.json();
  challenges = challenges.map(c => c.id === currentId ? {...c, bookmarked: data.bookmarked?1:0} : c);
  const btn  = document.getElementById("bk-btn");
  btn.textContent = data.bookmarked ? "★ Saved" : "☆ Save";
  btn.className   = "btn-bk" + (data.bookmarked ? " on" : "");
  updateNav(); renderList();
}

async function saveNote() {
  const content = document.getElementById("note-textarea").value;
  await fetch(`/api/challenges/${currentId}/note`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content})});
  challenges = challenges.map(c => c.id === currentId ? {...c, note:content} : c);
  const s = document.getElementById("note-saved");
  s.style.display = "block"; setTimeout(()=> s.style.display="none", 2000);
}

async function fetchHint() {
  const btn  = document.getElementById("hint-btn");
  const area = document.getElementById("hint-content");
  btn.textContent = "Loading..."; btn.disabled = true;
  area.innerHTML  = '<div style="font-size:13px;color:#eff2f644;margin-top:10px">Fetching hint...</div>';
  const res  = await fetch(`/api/hint/${currentId}`);
  const data = await res.json();
  btn.textContent = "💡 Request AI Hint"; btn.disabled = false;
  if (data.error) {
    area.innerHTML = `<div style="color:#ef4743;font-size:13px;margin-top:10px">${data.error}</div>`;
  } else {
    area.innerHTML = `
      <div class="hint-box">${data.hint}</div>
      <div class="hint-source">Source: ${data.source === 'ai' ? 'AI (HuggingFace)' : data.source === 'cache' ? 'Cached' : 'Built-in'}</div>`;
  }
}

async function loadNews() {
  const list = document.getElementById("news-list");
  list.innerHTML = '<div class="empty">Syncing feed...</div>';
  const res  = await fetch("/api/news");
  const data = await res.json();
  if (data.error) { list.innerHTML = `<div style="color:#ef4743;padding:1rem;font-size:13px">${data.error}</div>`; return; }
  const tagClass = {"AI News":"tag-ai","Tools":"tag-tools","Research":"tag-research","Industry":"tag-research"};
  list.innerHTML = data.map(n => `
    <div class="news-card">
      <div class="nc-row">
        <div style="flex:1">
          <div class="nc-title">${n.link ? `<a href="${n.link}" target="_blank">${n.title}</a>` : n.title}</div>
          <div class="nc-summary">${n.summary}</div>
          <div class="nc-date">${n.date}</div>
        </div>
        <span class="nc-tag ${tagClass[n.tag]||'tag-research'}">${n.tag}</span>
      </div>
    </div>`).join("");
}

function showView(name) {
  document.getElementById("list-view").style.display   = name==="list"  ?"flex" :"none";
  document.getElementById("editor-view").style.display = name==="editor"?"block":"none";
  document.getElementById("news-view").style.display   = name==="news"  ?"block":"none";
  document.querySelectorAll(".nav-tab").forEach((t,i) => {
    t.classList.toggle("active",(i===0 && name!=="news")||(i===1 && name==="news"));
  });
  if (name==="list"){currentId=null;renderList();}
  if (name==="editor" && editor) setTimeout(()=>editor.refresh(),50);
}

init();
</script>
</body>
</html>
